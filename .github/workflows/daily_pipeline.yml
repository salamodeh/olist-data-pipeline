name: Daily Pipeline Run

on:
  schedule:
    - cron: '0 6 * * *'  # Runs every day at 6:00 AM UTC
  workflow_dispatch:       # Also allows manual triggering from GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install dlt[duckdb] dbt-duckdb pandas requests

      - name: Run API ingestion
        run: python ingest_apis.py

      - name: Run dbt
        run: |
          cd olist_duckdb
          dbt deps
          dbt run
          dbt test

      - name: Upload DuckDB database as artifact
        uses: actions/upload-artifact@v4
        with:
          name: olist-database
          path: olist.duckdb