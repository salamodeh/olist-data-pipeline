version: 2


models:
  - name: fct_orders_enriched
    description: "Orders enriched with FX rates and holiday flags. One row per order."
    columns:
      - name: order_id
        description: "Primary key, references stg_orders"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to customers"
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: order_total_brl
        description: "Total order value in Brazilian Real (items + freight)"
      - name: order_total_usd
        description: "Order value converted to USD using same-day exchange rate"
      - name: is_holiday
        description: "True if the order was placed on a Brazilian public holiday"

  - name: fct_order_items
    description: "Item-level fact table — one row per product in each order. Enables product, seller, category, and shipping analysis."
    columns:
      - name: item_id
        description: "Surrogate key (order_id + order_item_id)"
        tests:
          - unique
          - not_null
      - name: order_id
        description: "Foreign key to orders"
        tests:
          - not_null
      - name: product_id
        description: "Foreign key to products"
      - name: seller_id
        description: "Foreign key to sellers"
      - name: customer_id
        description: "Foreign key to customers"
      - name: category_name_english
        description: "Product category in English"
      - name: price
        description: "Item price in BRL"
      - name: freight_value
        description: "Shipping cost for the item in BRL"
      - name: item_total_brl
        description: "Total item value (price + freight) in BRL"
      - name: item_total_usd
        description: "Total item value converted to USD"
      - name: is_holiday
        description: "True if the order was placed on a Brazilian public holiday"
      - name: delivery_days
        description: "Days from purchase to customer delivery"