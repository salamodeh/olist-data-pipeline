version: 2

models:
  - name: fct_orders_enriched
    description: "Orders enriched with FX rates and holiday flags. One row per order."
    columns:
      - name: order_id
        description: "Primary key, references stg_orders"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to customers"
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: order_total_brl
        description: "Total order value in Brazilian Real (items + freight)"
      - name: order_total_usd
        description: "Order value converted to USD using same-day exchange rate"
      - name: is_holiday
        description: "True if the order was placed on a Brazilian public holiday"

  - name: fct_order_items
    description: "Order line items enriched with customer, product, seller, payment, FX, and holiday data."
    columns:
      - name: item_id
        description: "Surrogate key generated from order_id and order_item_id"
        tests:
          - unique
          - not_null
      - name: order_status
        description: "Status of the order"
        tests:
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'unavailable', 'invoiced', 'processing', 'created', 'approved']
      - name: payment_type
        description: "Method of payment used"
        tests:
          - accepted_values:
              values: ['credit_card', 'boleto', 'voucher', 'debit_card', 'not_defined']